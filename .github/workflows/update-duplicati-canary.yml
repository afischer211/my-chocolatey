---
name: Update Duplicati Canary Package

on:
  schedule:
    # Run daily at 7:30 AM UTC to check for new Duplicati canary releases
    - cron: '30 7 * * *'
  workflow_dispatch:
    # Allow manual triggering of the workflow
    inputs:
      force:
        description: 'Force build and publish even if update.ps1 found no changes (e.g. to bootstrap the first release or re-push after fixing a checksum)'
        required: false
        default: false
        type: boolean

jobs:
  update-duplicati-canary:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PowerShell modules and Chocolatey
        shell: powershell
        run: |
          # Install Chocolatey-AU (Automatic Updater) module for Chocolatey packages
          # Retries guard against transient PowerShell Gallery flakiness (observed as a
          # spurious "No match was found" error even though the module exists and the
          # identical install succeeds in sibling workflows moments apart).
          function Install-WithRetry {
            param(
              [Parameter(Mandatory)][scriptblock]$Action,
              [string]$Description,
              [int]$MaxAttempts = 5
            )
            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                & $Action
                return
              }
              catch {
                Write-Warning "Attempt $attempt/$MaxAttempts to $Description failed: $($_.Exception.Message)"
                if ($attempt -eq $MaxAttempts) {
                  throw
                }
                Start-Sleep -Seconds (10 * $attempt)
              }
            }
          }

          Write-Host "Installing Chocolatey-AU module..."
          Install-WithRetry -Description "install NuGet package provider" -Action {
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -ErrorAction Stop
          }
          Install-WithRetry -Description "install Chocolatey-AU module" -Action {
            Install-Module -Name Chocolatey-AU -Force -Scope CurrentUser -ErrorAction Stop
          }

          # Install Chocolatey if not present
          Write-Host "Setting up Chocolatey..."
          if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }

          # Import the module
          Import-Module Chocolatey-AU
          Write-Host "Chocolatey-AU module installed and imported successfully"

          # Show Chocolatey-AU and Chocolatey versions for debugging
          Get-Module Chocolatey-AU | Format-List Name, Version
          choco --version

      - name: Update Duplicati canary package
        shell: powershell
        working-directory: duplicati-canary
        run: |
          Write-Host "Starting Duplicati canary package update check..."

          # Set error action preference
          $ErrorActionPreference = 'Stop'
          $env:au_NoCheckChocoVersion = $true
          $env:au_Force = $false

          # Check if update.ps1 exists
          if (!(Test-Path "update.ps1")) {
            Write-Warning "update.ps1 not found in duplicati-canary directory. Please create an AU update script first."
            Write-Host "Skipping update check until update.ps1 is created."
            exit 0
          }

          try {
            # Run the update script
            if ($env:au_Force -eq $true) {
              $au_Force = $true; .\update.ps1
            } else {
              .\update.ps1
            }
            Write-Host "Update check completed successfully"
          }
          catch {
            Write-Host "Error during update: $($_.Exception.Message)"
            throw
          }

      - name: Check for changes
        id: check-changes
        shell: powershell
        run: |
          # Check if there are any changes to commit
          $changes = git status --porcelain
          $forced = "${{ github.event.inputs.force }}" -eq 'true'
          if ($changes) {
            Write-Host "Changes detected:"
            Write-Host $changes
            echo "has-changes=true" >> $env:GITHUB_OUTPUT
          } elseif ($forced) {
            Write-Host "No file changes, but force=true was requested - proceeding anyway"
            echo "has-changes=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No changes detected"
            echo "has-changes=false" >> $env:GITHUB_OUTPUT
          }

      - name: Configure git
        if: steps.check-changes.outputs.has-changes == 'true'
        shell: powershell
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and publish package
        id: build-and-publish
        if: steps.check-changes.outputs.has-changes == 'true'
        shell: powershell
        working-directory: duplicati-canary
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          Write-Host "Building Chocolatey package..."

          # Check if API key is configured
          if ([string]::IsNullOrEmpty($env:CHOCOLATEY_API_KEY)) {
            Write-Error "CHOCOLATEY_API_KEY secret is not configured. Please add it to repository secrets."
            exit 1
          }

          try {
            # Build the package
            Write-Host "Running choco pack..."
            choco pack duplicati-canary.nuspec

            # Find the generated nupkg file
            $nupkgFile = Get-ChildItem -Filter "*.nupkg" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

            if ($nupkgFile) {
              Write-Host "Package built successfully: $($nupkgFile.Name)"

              # Validate the package (this will catch basic issues)
              Write-Host "Validating package..."
              choco install $nupkgFile.FullName --confirm --what-if

              # Push to chocolatey.org
              Write-Host "Publishing package to chocolatey.org..."
              choco push $nupkgFile.FullName --api-key $env:CHOCOLATEY_API_KEY --source https://push.chocolatey.org/

              Write-Host "Package published successfully!"

              # Extract version for tagging
              $xml = [xml](Get-Content "duplicati-canary.nuspec")
              $version = $xml.package.metadata.version
              echo "package-version=$version" >> $env:GITHUB_OUTPUT
            } else {
              Write-Error "No nupkg file was generated"
              exit 1
            }
          }
          catch {
            Write-Error "Failed to build or publish package: $($_.Exception.Message)"
            exit 1
          }

      - name: Commit changes and create tag
        if: steps.check-changes.outputs.has-changes == 'true'
        shell: powershell
        run: |
          # Commit only the metadata files, not downloaded binaries.
          # A forced publish (workflow_dispatch force=true) can reach this step with
          # nothing actually changed in the working tree - only commit if something is staged.
          git add duplicati-canary/duplicati-canary.nuspec duplicati-canary/tools/chocolateyinstall.ps1 duplicati-canary/legal/VERIFICATION.txt
          $staged = git diff --cached --name-only
          if ($staged) {
            git commit -m "Update Duplicati canary package to version ${{ steps.build-and-publish.outputs.package-version }}"
            git push origin HEAD
          } else {
            Write-Host "No metadata changes to commit (forced publish of an already-committed version)."
          }

          # Create version tag. Only delete an existing tag if one is actually present -
          # git tag -d / push --delete on a nonexistent tag would otherwise print a
          # (harmless but confusing) error on every first-ever tag for a version.
          $tagName = "duplicati-canary-v${{ steps.build-and-publish.outputs.package-version }}"
          $existingTag = git tag -l $tagName
          if ($existingTag) {
            git tag -d $tagName
            git push --delete origin $tagName
          }
          git tag $tagName
          git push origin $tagName

          Write-Host "Tagged as $tagName"

      - name: Summary
        shell: powershell
        run: |
          if ("${{ steps.check-changes.outputs.has-changes }}" -eq "true") {
            Write-Host "✅ Update found, package built and published to chocolatey.org"
            Write-Host "📦 Version: ${{ steps.build-and-publish.outputs.package-version }}"
            Write-Host "🏷️ Tagged as: duplicati-canary-v${{ steps.build-and-publish.outputs.package-version }}"
          } else {
            Write-Host "ℹ️ No updates available - Duplicati canary package is up to date"
          }
